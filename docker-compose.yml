services:
  webapp:
    image: localhost/xts:latest
    container_name: xts
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_INVENTREE_API_URL=${NUXT_PUBLIC_INVENTREE_API_URL}
      - NUXT_PUBLIC_INVENTREE_API_TOKEN=${NUXT_PUBLIC_INVENTREE_API_TOKEN}
      - NUXT_PUBLIC_USE_MOCK_API=${NUXT_PUBLIC_USE_MOCK_API:-false}
    # Optional: mount config volume for runtime-editable settings
    # volumes:
    #   - ./config:/app/config
